<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #f0f2f5; }
    .navbar { background: #1a1a2e; }
    .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn-primary { background: #16213e; border: none; }
    .btn-danger { border-radius: 8px; }
    .expense-item { border-left: 4px solid #0f3460; padding-left: 10px; }
    #alertBox { display: none; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3 mb-4">
  <span class="navbar-brand fw-bold fs-4">💰 Smart Expense Tracker</span>
  <span id="welcomeText" class="text-white"></span>
  <button class="btn btn-outline-light btn-sm" onclick="logout()" id="logoutBtn" style="display:none">Logout</button>
</nav>

<div class="container">

  <!-- AUTH SECTION -->
  <div id="authSection">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <ul class="nav nav-tabs mb-3" id="authTabs">
            <li class="nav-item">
              <button class="nav-link active" onclick="showTab('login')">Login</button>
            </li>
            <li class="nav-item">
              <button class="nav-link" onclick="showTab('register')">Register</button>
            </li>
          </ul>

          <!-- Login -->
          <div id="loginForm">
            <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email"/>
            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password"/>
            <button class="btn btn-primary w-100" onclick="login()">Login</button>
          </div>

          <!-- Register -->
          <div id="registerForm" style="display:none">
            <input type="text" id="regName" class="form-control mb-2" placeholder="Full Name"/>
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email"/>
            <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password"/>
            <input type="number" id="regBudget" class="form-control mb-3" placeholder="Monthly Budget (₹)"/>
            <button class="btn btn-primary w-100" onclick="register()">Register</button>
          </div>

          <div id="authMsg" class="mt-2 text-center text-danger fw-bold"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard" style="display:none">

    <!-- Alert Box -->
    <div id="alertBox" class="alert alert-warning fw-bold text-center mb-4">⚠️ Budget Alert sent to your email!</div>

    <!-- Stats -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <h6 class="text-muted">Monthly Budget</h6>
          <h3 class="text-primary fw-bold" id="statBudget">₹0</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <h6 class="text-muted">Total Spent</h6>
          <h3 class="text-danger fw-bold" id="statSpent">₹0</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <h6 class="text-muted">Remaining</h6>
          <h3 class="text-success fw-bold" id="statRemaining">₹0</h3>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- Add Expense -->
      <div class="col-md-4">
        <div class="card p-4 mb-4">
          <h5 class="fw-bold mb-3">➕ Add Expense</h5>
          <input type="text" id="expTitle" class="form-control mb-2" placeholder="Title (e.g. Lunch)"/>
          <input type="number" id="expAmount" class="form-control mb-2" placeholder="Amount (₹)"/>
          <select id="expCategory" class="form-control mb-3">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
            <option>Other</option>
          </select>
          <button class="btn btn-primary w-100" onclick="addExpense()">Add Expense</button>
        </div>

        <!-- Chart -->
        <div class="card p-4">
          <h5 class="fw-bold mb-3">📊 Spending Chart</h5>
          <canvas id="expenseChart"></canvas>
        </div>
      </div>

      <!-- Expense List -->
      <div class="col-md-8">
        <div class="card p-4">
          <h5 class="fw-bold mb-3">📋 Your Expenses</h5>
          <div id="expenseList">
            <p class="text-muted">No expenses yet. Add one!</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const AUTH = 'https://auth-service-c9z9.onrender.com';
  const EXPENSE = 'https://expense-service-3b99.onrender.com';
  const ALERT = 'https://alert-service-vy7b.onrender.com';

  let currentUser = null;
  let chartInstance = null;

  function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function register() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const budget = document.getElementById('regBudget').value;
    const res = await fetch(`${AUTH}/register`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, email, password, budget: parseFloat(budget) })
    });
    const data = await res.json();
    document.getElementById('authMsg').innerText = data.message || data.error;
    if (data.message) showTab('login');
  }

  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch(`${AUTH}/login`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) { document.getElementById('authMsg').innerText = data.error; return; }
    currentUser = data;
    showDashboard();
  }

  function logout() {
    currentUser = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('welcomeText').innerText = '';
  }

  async function showDashboard() {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('welcomeText').innerText = `👋 Hi, ${currentUser.name}`;
    document.getElementById('logoutBtn').style.display = 'block';
    document.getElementById('statBudget').innerText = `₹${currentUser.budget}`;
    await loadExpenses();
  }

  async function addExpense() {
    const title = document.getElementById('expTitle').value;
    const amount = parseFloat(document.getElementById('expAmount').value);
    const category = document.getElementById('expCategory').value;
    if (!title || !amount) return alert('Fill in all fields!');
    await fetch(`${EXPENSE}/add`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: currentUser.email, title, amount, category })
    });
    document.getElementById('expTitle').value = '';
    document.getElementById('expAmount').value = '';
    await loadExpenses();
    await checkBudget();
  }

  async function loadExpenses() {
    const res = await fetch(`${EXPENSE}/total/${currentUser.email}`);
    const data = await res.json();
    const total = data.total;
    const remaining = currentUser.budget - total;
    document.getElementById('statSpent').innerText = `₹${total}`;
    document.getElementById('statRemaining').innerText = `₹${remaining > 0 ? remaining : 0}`;

    const list = document.getElementById('expenseList');
    if (data.expenses.length === 0) {
      list.innerHTML = '<p class="text-muted">No expenses yet. Add one!</p>';
    } else {
      list.innerHTML = data.expenses.reverse().map(e => `
        <div class="expense-item mb-3 d-flex justify-content-between align-items-center">
          <div>
            <strong>${e.title}</strong> <span class="badge bg-secondary">${e.category}</span><br/>
            <small class="text-muted">${e.date}</small>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="text-danger fw-bold">₹${e.amount}</span>
            <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">🗑</button>
          </div>
        </div>
      `).join('<hr/>');
    }
    updateChart(data.expenses);
  }

  async function deleteExpense(id) {
    await fetch(`${EXPENSE}/delete/${currentUser.email}/${id}`, { method: 'DELETE' });
    await loadExpenses();
  }

  async function checkBudget() {
    const res = await fetch(`${EXPENSE}/total/${currentUser.email}`);
    const data = await res.json();
    const alertRes = await fetch(`${ALERT}/check-budget`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: currentUser.email,
        name: currentUser.name,
        total: data.total,
        budget: currentUser.budget
      })
    });
    const alertData = await alertRes.json();
    if (alertData.alert) {
      document.getElementById('alertBox').style.display = 'block';
      setTimeout(() => document.getElementById('alertBox').style.display = 'none', 5000);
    }
  }

  function updateChart(expenses) {
    const categories = {};
    expenses.forEach(e => {
      categories[e.category] = (categories[e.category] || 0) + e.amount;
    });
    const ctx = document.getElementById('expenseChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(categories),
        datasets: [{ data: Object.values(categories),
          backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff','#ff9f40']
        }]
      },
      options: { plugins: { legend: { position: 'bottom' } } }
    });
  }
</script>
</body>
</html>
